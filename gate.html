<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>RIKA YAMADA — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sage: #7a9e87;
      --sage-pale: #d4e5d8;
      --sage-mist: #eef4f0;
      --yellow-pale: #f5efc8;
      --cream: #faf8f3;
      --brown: #4a3d2e;
      --brown-mid: #7a6555;
      --brown-light: #b8a090;
      --white: #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      overflow: hidden;
    }

    /* 背景装飾 */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,229,216,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      left: -10%;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,239,200,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    .gate-wrap {
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ロゴ */
    .gate-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .gate-logo-name {
      font-style: italic;
      font-size: 2rem;
      font-weight: 300;
      color: var(--brown);
      letter-spacing: 0.15em;
      display: block;
      margin-bottom: 0.3rem;
    }

    .gate-logo-sub {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sage);
    }

    /* カード */
    .gate-card {
      background: var(--white);
      border: 1px solid var(--sage-pale);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(74,61,46,0.08);
    }

    .gate-card-title {
      font-style: italic;
      font-size: 1.3rem;
      color: var(--brown);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .gate-card-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.7rem;
      color: var(--brown-light);
      text-align: center;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    /* フォーム */
    .gate-form { }

    .gate-label {
      display: block;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.5rem;
    }

    .gate-input {
      width: 100%;
      background: var(--sage-mist);
      border: 1px solid var(--sage-pale);
      border-radius: 8px;
      padding: 0.9rem 1.2rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: var(--brown);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.15em;
      margin-bottom: 1.2rem;
    }

    .gate-input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,158,135,0.12);
    }

    .gate-btn {
      width: 100%;
      background: var(--sage);
      color: var(--white);
      border: none;
      border-radius: 30px;
      padding: 0.9rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    .gate-btn:hover {
      background: #8fb09c;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(122,158,135,0.25);
    }

    /* エラーメッセージ */
    .gate-error {
      display: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.7rem;
      color: #c0392b;
      text-align: center;
      margin-top: 1rem;
      padding: 0.6rem;
      background: rgba(192,57,43,0.06);
      border-radius: 6px;
    }

    .gate-error.show { display: block; }

    /* 装飾ライン */
    .gate-deco {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .gate-deco-line {
      flex: 1;
      height: 1px;
      background: var(--sage-pale);
    }

    .gate-deco-icon {
      color: var(--sage-pale);
      font-size: 0.8rem;
    }

    /* フッター */
    .gate-footer {
      text-align: center;
      margin-top: 2rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.6rem;
      color: var(--brown-light);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="gate-wrap">

    <div class="gate-logo">
      <span class="gate-logo-name">Rika Yamada</span>
      <span class="gate-logo-sub">Portfolio</span>
    </div>

    <div class="gate-card">
      <div class="gate-card-title">Welcome</div>
      <p class="gate-card-desc">
        このポートフォリオはパスワード制限がかかっています。<br>
        パスワードをご入力ください。
      </p>

      <div class="gate-deco">
        <div class="gate-deco-line"></div>
        <div class="gate-deco-icon">✿</div>
        <div class="gate-deco-line"></div>
      </div>

      <div class="gate-form">
        <label class="gate-label">Password</label>
        <input
          type="password"
          class="gate-input"
          id="passwordInput"
          placeholder="パスワードを入力"
          autocomplete="off"
        >
        <button class="gate-btn" onclick="checkPassword()">Enter ✿</button>
        <div class="gate-error" id="errorMsg">
          パスワードが違います。もう一度お試しください。
        </div>
      </div>
    </div>

    <div class="gate-footer">
      © Rika Yamada. All rights reserved.
    </div>

  </div>

  <script>
    // ===== パスワードをここで設定 =====
    const PASSWORD = '260001';
    // ==================================

    // すでにログイン済みならそのままトップへ
    if (sessionStorage.getItem('auth') === 'ok') {
      location.href = 'index.html';
    }

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('errorMsg');

      if (input === PASSWORD) {
        sessionStorage.setItem('auth', 'ok');
        location.href = 'index.html';
      } else {
        error.classList.add('show');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    // Enterキーでも送信
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>

</body>
</html>
